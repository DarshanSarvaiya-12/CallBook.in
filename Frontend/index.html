<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarat Smart Directory</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pinterest-style Masonry Columns layout */
        .pinterest-grid {
            columns: 2;
            column-gap: 12px;
        }
        @media (min-width: 640px) {
            .pinterest-grid {
                columns: 3;
                column-gap: 16px;
            }
        }
        .pinterest-card {
            break-inside: avoid;
            margin-bottom: 12px;
        }
    </style>
</head>
<body class="bg-[#efefef] font-sans min-h-screen text-neutral-800">

    <!-- Sticky Navigation Top Bar (Pinterest Style) -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-4 py-3 flex items-center gap-3 shadow-sm border-b border-gray-100">
        <!-- Logo Icon -->
        <div class="w-9 h-9 bg-red-600 rounded-full flex items-center justify-center text-white font-black text-lg tracking-tighter shrink-0">
            જી
        </div>
        
        <!-- Smart Search Input Box -->
        <div class="flex-1 flex bg-[#e9e9e9] rounded-full px-4 items-center border-2 border-transparent focus-within:border-neutral-300 transition-all">
            <input id="searchInput" type="text" placeholder="Search for 'water tank repair', 'garage'..." 
                   class="w-full bg-transparent py-2.5 outline-none text-sm text-neutral-800 placeholder-neutral-500">
            <button id="searchBtn" onclick="performSearch()" class="text-neutral-500 font-bold text-xs bg-white px-3 py-1 rounded-full shadow-xs active:scale-95 transition shrink-0 ml-1">
                Go
            </button>
        </div>
    </header>

    <!-- App Container -->
    <main class="max-w-4xl mx-auto px-3 mt-4">
        
        <!-- Quick Informative Tagline -->
        <div class="px-2 mb-4">
            <h2 class="text-xs font-bold text-neutral-500 uppercase tracking-wider">AI Local Directory • Gujarat</h2>
        </div>

        <!-- Status/Loader Spinner -->
        <div id="statusText" class="text-center font-medium text-sm text-neutral-500 my-8 hidden">
            <span class="inline-block animate-pulse">Finding matching listings...</span>
        </div>

        <!-- Pinterest Column Layout -->
        <div id="listingsContainer" class="pinterest-grid">
            <!-- Dynamic Cards Will Load Here -->
        </div>
    </main>

    <script>
        // Replace this with your exact Render web service URL
        const BACKEND_URL = "https://gujarat-directory-backend.onrender.com";

        // Automatically fetch data on app bootup
        window.addEventListener('DOMContentLoaded', async () => {
            showStatus(true, "Loading pins...");
            try {
                const res = await fetch(`${BACKEND_URL}/api/listings`);
                const data = await res.json();
                renderCards(data);
                showStatus(false);
            } catch (err) {
                showStatus(true, "Failed to load board. Try refreshing.");
            }
        });

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            showStatus(true, "AI filtering directory...");
            document.getElementById('listingsContainer').innerHTML = "";

            try {
                const res = await fetch(`${BACKEND_URL}/api/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const filteredData = await res.json();
                
                if(filteredData.length === 0) {
                    showStatus(true, "No matching pins found for your query.");
                } else {
                    showStatus(false);
                    renderCards(filteredData);
                }
            } catch (err) {
                showStatus(true, "Search request failed.");
            }
        }

        function renderCards(items) {
            const container = document.getElementById('listingsContainer');
            
            container.innerHTML = items.map((item, index) => {
                // Alternating image sizes to generate authentic Pinterest masonry stagger
                const isEven = index % 2 === 0;
                const shopImgHeight = isEven ? "h-40" : "h-52";
                const ownerImgHeight = isEven ? "h-32" : "h-28";

                return `
                    <!-- Pinterest Item Block -->
                    <div class="pinterest-card bg-white rounded-2xl overflow-hidden shadow-xs hover:shadow-md border border-neutral-200/60 p-2 flex flex-col gap-2 group transition duration-200">
                        
                        <!-- Primary Block Image (Shop) -->
                        <div class="relative ${shopImgHeight} w-full rounded-xl overflow-hidden bg-neutral-100">
                            <img src="${item.images.shop}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Shop view">
                            <span class="absolute top-2 left-2 bg-black/60 backdrop-blur-xs text-white text-[9px] px-1.5 py-0.5 rounded-full font-medium">Shop</span>
                        </div>

                        <!-- Secondary Stack Image (Owner / Person) -->
                        <div class="relative ${ownerImgHeight} w-full rounded-xl overflow-hidden bg-neutral-100">
                            <img src="${item.images.owner}" class="w-full h-full object-cover" alt="Owner view">
                            <span class="absolute top-2 left-2 bg-black/60 backdrop-blur-xs text-white text-[9px] px-1.5 py-0.5 rounded-full font-medium">Contact Person</span>
                        </div>

                        <!-- Card Details -->
                        <div class="px-1 py-1">
                            <h3 class="text-sm font-bold text-neutral-800 leading-snug tracking-tight">${item.name}</h3>
                            <p class="text-[11px] text-neutral-500 mt-0.5 font-medium">${item.area}, ${item.city}</p>
                            
                            <!-- Tags line -->
                            <div class="flex flex-wrap gap-1 mt-2">
                                ${item.category.split(',').slice(0, 2).map(cat => `
                                    <span class="bg-neutral-100 text-neutral-600 text-[9px] px-2 py-0.5 rounded-md font-medium">${cat.trim()}</span>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Native Action Call Row -->
                        <div class="pt-2 border-t border-neutral-100 flex items-center justify-between px-1">
                            <span class="text-[11px] font-bold text-neutral-700">${item.contact}</span>
                            <a href="tel:${item.contact.replace(/\s+/g, '')}" 
                               class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-1.5 rounded-full active:scale-95 transition">
                                Call
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showStatus(show, text = "") {
            const el = document.getElementById('statusText');
            if (show) {
                el.innerHTML = `<span class="inline-block animate-pulse">${text}</span>`;
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
